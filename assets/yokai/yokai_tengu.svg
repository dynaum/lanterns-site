<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 768" width="512" height="768">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e18"/>
      <stop offset="50%" stop-color="#141e2e"/>
      <stop offset="100%" stop-color="#202840"/>
    </linearGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.55" r="0.7">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.5"/>
    </radialGradient>
    <radialGradient id="lglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#e06b2a" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#7a2e1a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0a0e18" stop-opacity="0"/>
    </radialGradient>
    <filter id="halo" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="512" height="768" fill="url(#bg)"/>
  <rect width="512" height="768" fill="url(#vignette)"/>

  <!-- Stars -->
  <g fill="#fff8e0" opacity="0.65">
    <circle cx="80" cy="80" r="1.3"/>
    <circle cx="200" cy="50" r="1"/>
    <circle cx="380" cy="100" r="1.2"/>
    <circle cx="460" cy="70" r="1"/>
    <circle cx="70" cy="210" r="1"/>
    <circle cx="450" cy="200" r="0.9"/>
    <circle cx="250" cy="40" r="1.1"/>
  </g>

  <!-- Glow halo (ember) -->
  <circle cx="256" cy="370" r="200" fill="url(#lglow)" filter="url(#halo)"/>

  <!-- Ground perch shadow -->
  <ellipse cx="256" cy="460" rx="90" ry="16" fill="#1a1626" opacity="0.35"/>

  <!-- Left wing polygon (INK_NIGHT fill, INK_PLUM outline) -->
  <polygon points="144,328 80,360 144,440"
           fill="#1a1626" stroke="#3a2240" stroke-width="2.5"/>
  <!-- Wing feather lines left -->
  <line x1="144" y1="336" x2="92" y2="356" stroke="#3a2240" stroke-width="1.5" opacity="0.7"/>
  <line x1="144" y1="352" x2="84" y2="368" stroke="#3a2240" stroke-width="1.5" opacity="0.7"/>
  <line x1="144" y1="368" x2="88" y2="378" stroke="#3a2240" stroke-width="1.5" opacity="0.7"/>
  <line x1="144" y1="384" x2="100" y2="392" stroke="#3a2240" stroke-width="1.5" opacity="0.7"/>
  <line x1="144" y1="400" x2="112" y2="408" stroke="#3a2240" stroke-width="1.5" opacity="0.7"/>
  <line x1="144" y1="416" x2="124" y2="424" stroke="#3a2240" stroke-width="1.5" opacity="0.7"/>

  <!-- Right wing polygon (INK_NIGHT fill, INK_PLUM outline) -->
  <polygon points="368,328 432,360 368,440"
           fill="#1a1626" stroke="#3a2240" stroke-width="2.5"/>
  <!-- Wing feather lines right -->
  <line x1="368" y1="336" x2="420" y2="356" stroke="#3a2240" stroke-width="1.5" opacity="0.7"/>
  <line x1="368" y1="352" x2="428" y2="368" stroke="#3a2240" stroke-width="1.5" opacity="0.7"/>
  <line x1="368" y1="368" x2="424" y2="378" stroke="#3a2240" stroke-width="1.5" opacity="0.7"/>
  <line x1="368" y1="384" x2="412" y2="392" stroke="#3a2240" stroke-width="1.5" opacity="0.7"/>
  <line x1="368" y1="400" x2="400" y2="408" stroke="#3a2240" stroke-width="1.5" opacity="0.7"/>
  <line x1="368" y1="416" x2="388" y2="424" stroke="#3a2240" stroke-width="1.5" opacity="0.7"/>

  <!-- Shoulder cloak (INK_PLUM) -->
  <polygon points="158,328 354,328 368,398 144,398"
           fill="#3a2240"/>

  <!-- Body polygon (INK_NIGHT) -->
  <polygon points="186,342 326,342 340,454 172,454"
           fill="#1a1626"/>

  <!-- Crow head (INK_NIGHT) -->
  <circle cx="256" cy="272" r="39" fill="#1a1626"/>

  <!-- Beak polygon (INK_CINDER) — extends right like a crow/tengu beak -->
  <polygon points="256,272 354,258 256,300" fill="#9a3220"/>

  <!-- Eye (INK_FLAME) — left side of head since beak faces right -->
  <circle cx="239" cy="262" r="12" fill="#f4b042" opacity="0.95"/>
  <circle cx="239" cy="262" r="5" fill="#1a1626"/>
  <circle cx="236" cy="259" r="3" fill="#f4ead6" opacity="0.6"/>

  <!-- Cloak collar detail lines -->
  <line x1="200" y1="330" x2="256" y2="342" stroke="#1a1626" stroke-width="2" opacity="0.5"/>
  <line x1="312" y1="330" x2="256" y2="342" stroke="#1a1626" stroke-width="2" opacity="0.5"/>

  <!-- Talons / feet at perch -->
  <line x1="210" y1="454" x2="186" y2="468" stroke="#1a1626" stroke-width="5" stroke-linecap="round"/>
  <line x1="186" y1="468" x2="164" y2="468" stroke="#1a1626" stroke-width="4" stroke-linecap="round"/>
  <line x1="186" y1="468" x2="178" y2="480" stroke="#1a1626" stroke-width="3" stroke-linecap="round"/>
  <line x1="302" y1="454" x2="326" y2="468" stroke="#1a1626" stroke-width="5" stroke-linecap="round"/>
  <line x1="326" y1="468" x2="348" y2="468" stroke="#1a1626" stroke-width="4" stroke-linecap="round"/>
  <line x1="326" y1="468" x2="334" y2="480" stroke="#1a1626" stroke-width="3" stroke-linecap="round"/>
</svg>
