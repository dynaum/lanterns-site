<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 768" width="512" height="768">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080810"/>
      <stop offset="55%" stop-color="#0e0a1c"/>
      <stop offset="100%" stop-color="#1a0e30"/>
    </linearGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.55" r="0.7">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
    <radialGradient id="lglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#3a2240" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#1a0e30" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#080810" stop-opacity="0"/>
    </radialGradient>
    <filter id="halo" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="512" height="768" fill="url(#bg)"/>
  <rect width="512" height="768" fill="url(#vignette)"/>

  <!-- Stars -->
  <g fill="#fff8e0" opacity="0.65">
    <circle cx="80" cy="80" r="1.3"/>
    <circle cx="200" cy="50" r="1"/>
    <circle cx="380" cy="100" r="1.2"/>
    <circle cx="460" cy="70" r="1"/>
    <circle cx="70" cy="210" r="1"/>
    <circle cx="450" cy="200" r="0.9"/>
    <circle cx="250" cy="40" r="1.1"/>
  </g>

  <!-- Glow halo (faint plum) -->
  <circle cx="256" cy="370" r="200" fill="url(#lglow)" filter="url(#halo)"/>

  <!-- Floor pool shadow -->
  <ellipse cx="256" cy="495" rx="80" ry="18" fill="#1a1626" opacity="0.4"/>

  <!-- Cloak body polygon — INK_NIGHT fill, INK_PLUM outline -->
  <polygon points="256,240 340,282 354,352 354,436 326,492 284,464 256,492 228,464 186,492 158,436 158,352 172,282"
           fill="#1a1626" stroke="#3a2240" stroke-width="2"/>

  <!-- Tatter lines dangling off hem -->
  <line x1="186" y1="492" x2="176" y2="526" stroke="#3a2240" stroke-width="2" stroke-linecap="round"/>
  <line x1="256" y1="492" x2="256" y2="530" stroke="#3a2240" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="326" y1="492" x2="336" y2="524" stroke="#3a2240" stroke-width="2" stroke-linecap="round"/>

  <!-- Hood opening — deep black circle -->
  <circle cx="256" cy="310" r="45" fill="#000000" opacity="0.95"/>

  <!-- Eye flame left: outer glow + inner bright -->
  <circle cx="230" cy="310" r="18" fill="#f4b042"/>
  <circle cx="230" cy="310" r="9" fill="#f4ead6"/>
  <!-- Eye flame right -->
  <circle cx="282" cy="310" r="18" fill="#f4b042"/>
  <circle cx="282" cy="310" r="9" fill="#f4ead6"/>

  <!-- Faint flame leak around eyes -->
  <circle cx="230" cy="310" r="26" fill="#f4b042" opacity="0.15" filter="url(#halo)"/>
  <circle cx="282" cy="310" r="26" fill="#f4b042" opacity="0.15" filter="url(#halo)"/>
</svg>
