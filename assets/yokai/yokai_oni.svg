<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 768" width="512" height="768">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0806"/>
      <stop offset="50%" stop-color="#3a1008"/>
      <stop offset="100%" stop-color="#7a2010"/>
    </linearGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.55" r="0.7">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.5"/>
    </radialGradient>
    <radialGradient id="lglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#e06b2a" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#7a2e1a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1a0806" stop-opacity="0"/>
    </radialGradient>
    <filter id="halo" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="512" height="768" fill="url(#bg)"/>
  <rect width="512" height="768" fill="url(#vignette)"/>

  <!-- Stars -->
  <g fill="#fff8e0" opacity="0.65">
    <circle cx="80" cy="80" r="1.3"/>
    <circle cx="200" cy="50" r="1"/>
    <circle cx="380" cy="100" r="1.2"/>
    <circle cx="460" cy="70" r="1"/>
    <circle cx="70" cy="210" r="1"/>
    <circle cx="450" cy="200" r="0.9"/>
    <circle cx="250" cy="40" r="1.1"/>
  </g>

  <!-- Glow halo -->
  <circle cx="256" cy="380" r="200" fill="url(#lglow)" filter="url(#halo)"/>

  <!-- Ground stomp shadow -->
  <ellipse cx="256" cy="490" rx="140" ry="22" fill="#1a1626" opacity="0.35"/>

  <!-- Body polygon (INK_RUST) -->
  <polygon points="148,308 364,308 388,476 124,476"
           fill="#7a2e1a"/>

  <!-- Loincloth polygon (INK_GOLD) -->
  <polygon points="136,404 376,404 364,452 148,452"
           fill="#d8a64a"/>
  <!-- Loincloth stripe lines -->
  <line x1="136" y1="416" x2="376" y2="416" stroke="#1a1626" stroke-width="2" opacity="0.6"/>
  <line x1="136" y1="428" x2="376" y2="428" stroke="#1a1626" stroke-width="2" opacity="0.6"/>
  <line x1="136" y1="440" x2="376" y2="440" stroke="#1a1626" stroke-width="2" opacity="0.6"/>

  <!-- Head circle (INK_PARCH) -->
  <circle cx="256" cy="260" r="60" fill="#e8dcb8"/>

  <!-- Left horn (INK_PARCH) -->
  <polygon points="208,212 220,160 232,212" fill="#e8dcb8"/>
  <!-- Right horn (INK_PARCH) -->
  <polygon points="280,212 292,160 304,212" fill="#e8dcb8"/>

  <!-- Eyes (INK_FLAME) -->
  <circle cx="234" cy="260" r="11" fill="#f4b042"/>
  <circle cx="278" cy="260" r="11" fill="#f4b042"/>
  <!-- Eye pupils -->
  <circle cx="234" cy="260" r="5" fill="#1a1626"/>
  <circle cx="278" cy="260" r="5" fill="#1a1626"/>

  <!-- Mouth line (INK_CINDER) -->
  <line x1="230" y1="276" x2="282" y2="276" stroke="#9a3220" stroke-width="7" stroke-linecap="round"/>
  <!-- Fang marks -->
  <line x1="244" y1="276" x2="244" y2="288" stroke="#9a3220" stroke-width="3" stroke-linecap="round"/>
  <line x1="268" y1="276" x2="268" y2="288" stroke="#9a3220" stroke-width="3" stroke-linecap="round"/>

  <!-- Club arm line (INK_CINDER) -->
  <line x1="352" y1="332" x2="440" y2="228" stroke="#9a3220" stroke-width="14" stroke-linecap="round"/>
  <!-- Club head spikes -->
  <circle cx="440" cy="228" r="22" fill="#9a3220"/>
  <circle cx="440" cy="205" r="8" fill="#9a3220"/>
  <circle cx="462" cy="218" r="8" fill="#9a3220"/>
  <circle cx="462" cy="242" r="8" fill="#9a3220"/>
  <circle cx="418" cy="210" r="7" fill="#9a3220"/>
</svg>
