<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 768" width="512" height="768">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#140e0c"/>
      <stop offset="50%" stop-color="#281814"/>
      <stop offset="100%" stop-color="#4a2820"/>
    </linearGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.55" r="0.7">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.5"/>
    </radialGradient>
    <radialGradient id="lglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#7a2e1a" stop-opacity="0.85"/>
      <stop offset="40%" stop-color="#c8607a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#140e0c" stop-opacity="0"/>
    </radialGradient>
    <filter id="halo" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="512" height="768" fill="url(#bg)"/>
  <rect width="512" height="768" fill="url(#vignette)"/>

  <!-- Stars -->
  <g fill="#fff8e0" opacity="0.65">
    <circle cx="80" cy="80" r="1.3"/>
    <circle cx="200" cy="50" r="1"/>
    <circle cx="380" cy="100" r="1.2"/>
    <circle cx="460" cy="70" r="1"/>
    <circle cx="70" cy="210" r="1"/>
    <circle cx="450" cy="200" r="0.9"/>
    <circle cx="250" cy="40" r="1.1"/>
  </g>

  <!-- Glow halo -->
  <circle cx="256" cy="370" r="190" fill="url(#lglow)" filter="url(#halo)"/>

  <!-- Floor shadow -->
  <ellipse cx="256" cy="540" rx="60" ry="16" fill="#1a1626" opacity="0.4"/>

  <!-- Geta sandal (INK_ASH) — drawn below so shaft overlaps -->
  <rect x="228" y="450" width="56" height="15" fill="#7d7468" rx="3"/>
  <!-- Sandal teeth -->
  <rect x="236" y="464" width="10" height="8" fill="#7d7468"/>
  <rect x="266" y="464" width="10" height="8" fill="#7d7468"/>

  <!-- Body shaft (INK_PARCH) -->
  <rect x="240" y="340" width="32" height="96" fill="#f4ead6"/>

  <!-- Canopy triangle (INK_RUST) -->
  <polygon points="128,338 256,210 384,338" fill="#7a2e1a"/>

  <!-- Canopy spokes from apex to rim -->
  <line x1="256" y1="210" x2="128" y2="338" stroke="#f4ead6" stroke-width="2" opacity="0.45"/>
  <line x1="256" y1="210" x2="192" y2="330" stroke="#f4ead6" stroke-width="2" opacity="0.45"/>
  <line x1="256" y1="210" x2="256" y2="338" stroke="#f4ead6" stroke-width="2" opacity="0.45"/>
  <line x1="256" y1="210" x2="320" y2="330" stroke="#f4ead6" stroke-width="2" opacity="0.45"/>
  <line x1="256" y1="210" x2="384" y2="338" stroke="#f4ead6" stroke-width="2" opacity="0.45"/>

  <!-- Canopy scalloped rim (INK_NIGHT polyline) -->
  <polyline points="128,338 150,326 172,340 194,326 216,340 238,326 256,338 274,326 296,340 318,326 340,340 362,326 384,338"
            fill="none" stroke="#1a1626" stroke-width="3" stroke-linejoin="round"/>

  <!-- Eye outer (INK_BONE) -->
  <circle cx="256" cy="375" r="22" fill="#f4ead6"/>
  <!-- Eye pupil (INK_NIGHT) -->
  <circle cx="256" cy="375" r="12" fill="#1a1626"/>
  <!-- Eye shine -->
  <circle cx="262" cy="369" r="4" fill="#f4ead6" opacity="0.7"/>

  <!-- Tongue (INK_ROSE) -->
  <line x1="256" y1="400" x2="256" y2="450" stroke="#c8607a" stroke-width="10" stroke-linecap="round"/>
  <!-- Tongue tip split -->
  <line x1="256" y1="440" x2="248" y2="458" stroke="#c8607a" stroke-width="6" stroke-linecap="round"/>
  <line x1="256" y1="440" x2="264" y2="458" stroke="#c8607a" stroke-width="6" stroke-linecap="round"/>
</svg>
