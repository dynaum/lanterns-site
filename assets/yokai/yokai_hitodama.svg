<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 768" width="512" height="768">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e1020"/>
      <stop offset="55%" stop-color="#1a1440"/>
      <stop offset="100%" stop-color="#3a2864"/>
    </linearGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.55" r="0.7">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.45"/>
    </radialGradient>
    <radialGradient id="lglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#bce8ff" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#7080d8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#3a2864" stop-opacity="0"/>
    </radialGradient>
    <filter id="halo" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="512" height="768" fill="url(#bg)"/>
  <rect width="512" height="768" fill="url(#vignette)"/>

  <!-- Stars -->
  <g fill="#fff8e0" opacity="0.65">
    <circle cx="80" cy="80" r="1.3"/>
    <circle cx="200" cy="50" r="1"/>
    <circle cx="380" cy="100" r="1.2"/>
    <circle cx="460" cy="70" r="1"/>
    <circle cx="70" cy="210" r="1"/>
    <circle cx="450" cy="200" r="0.9"/>
    <circle cx="250" cy="40" r="1.1"/>
  </g>

  <!-- Glow halo -->
  <circle cx="256" cy="360" r="200" fill="url(#lglow)" filter="url(#halo)"/>

  <!-- Trailing wisp main -->
  <line x1="256" y1="468" x2="256" y2="580" stroke="#7080d8" stroke-opacity="0.5" stroke-width="10" stroke-linecap="round"/>
  <!-- Trailing wisp offset -->
  <line x1="264" y1="490" x2="270" y2="600" stroke="#7080d8" stroke-opacity="0.25" stroke-width="5" stroke-linecap="round"/>

  <!-- Outer teardrop body -->
  <polygon points="256,234 346,288 346,396 292,468 220,468 166,396 166,288"
           fill="#bce8ff"/>

  <!-- Inner bright core -->
  <polygon points="256,270 316,308 316,394 256,432 196,394 196,308"
           fill="#f4ead6" opacity="0.9"/>

  <!-- Eyes -->
  <circle cx="231" cy="342" r="11" fill="#1a1626"/>
  <circle cx="281" cy="342" r="11" fill="#1a1626"/>
  <!-- Eye shine -->
  <circle cx="227" cy="338" r="3" fill="#bce8ff" opacity="0.6"/>
  <circle cx="277" cy="338" r="3" fill="#bce8ff" opacity="0.6"/>

  <!-- Mouth -->
  <line x1="234" y1="388" x2="278" y2="388" stroke="#1a1626" stroke-width="9" stroke-linecap="round"/>

  <!-- Orbiting wisps -->
  <circle cx="138" cy="340" r="10" fill="#7080d8" opacity="0.7"/>
  <circle cx="140" cy="310" r="7" fill="#bce8ff" opacity="0.5"/>
  <circle cx="374" cy="348" r="13" fill="#7080d8" opacity="0.65"/>
  <circle cx="368" cy="300" r="8" fill="#bce8ff" opacity="0.4"/>
</svg>
